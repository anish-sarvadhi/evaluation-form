<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SDE-I Assessment Form</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FAFAF9; --surface:#FFFFFF; --surface-alt:#F5F5F0; --border:#E8E5E0; --border-strong:#D4D0C8;
  --text-primary:#1A1A18; --text-secondary:#5C5C58; --text-tertiary:#8A8A85;
  --accent:#1B4332; --accent-light:#E8F0EC; --accent-mid:#2D6A4F; --red:#991B1B;
  --radius:10px; --radius-sm:6px; --shadow-sm:0 1px 3px rgba(0,0,0,.06); --shadow-md:0 4px 12px rgba(0,0,0,.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text-primary);line-height:1.55;-webkit-font-smoothing:antialiased;}
.hero{background:linear-gradient(135deg,#1B4332 0%,#0B2420 60%,#14362E 100%);padding:28px 32px;position:relative;overflow:hidden;}
.hero::after{content:'L1';position:absolute;top:8px;right:32px;font-size:96px;font-weight:800;color:rgba(255,255,255,.05);line-height:1;}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:4px 12px;font-size:10px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:12px;}
.hero-badge .dot{width:6px;height:6px;background:#34D399;border-radius:50%;}
.hero h1{font-size:26px;font-weight:700;color:#fff;letter-spacing:-.3px;}
.hero p{font-size:13px;color:rgba(255,255,255,.6);margin-top:2px;}
.shell{max-width:780px;margin:20px auto;padding:0 24px 120px;}
.meta{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px;}
.field{display:flex;flex-direction:column;gap:4px;}
.meta label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text-tertiary);}
.meta input,.meta select{font-family:inherit;font-size:13px;padding:9px 10px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);background:var(--surface);color:var(--text-primary);}
.meta input:focus,.meta select:focus{outline:none;border-color:var(--accent-mid);box-shadow:0 0 0 3px var(--accent-light);}
.stepper{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden;}
.step-head{padding:16px 20px;border-bottom:1px solid var(--border);background:var(--surface-alt);}
.step-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.step-meta .count{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--text-tertiary);}
.step-meta .answered{font-size:11px;font-weight:600;color:var(--accent);background:var(--accent-light);padding:2px 8px;border-radius:4px;}
.step-head h2{font-size:18px;font-weight:700;}
.dots{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;}
.dot-step{width:26px;height:5px;border-radius:3px;background:var(--border);transition:background .2s;}
.dot-step.done{background:var(--accent-mid);}
.dot-step.cur{background:var(--accent);}
.step-body{padding:18px 20px 8px;}
.panel{display:none;}
.panel.active{display:block;animation:fade .25s ease;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.q{margin-bottom:20px;}
.q:last-child{margin-bottom:8px;}
.q-head{display:flex;gap:8px;align-items:flex-start;margin-bottom:10px;}
.q-num{font-size:11px;font-weight:600;color:var(--accent);background:var(--accent-light);padding:2px 7px;border-radius:4px;flex-shrink:0;margin-top:1px;}
.q-text{font-size:14px;font-weight:600;font-style:italic;line-height:1.45;}
.opt{display:flex;gap:10px;align-items:flex-start;padding:11px 13px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;cursor:pointer;transition:all .12s;background:var(--surface);}
.opt:hover{border-color:var(--border-strong);background:var(--surface-alt);}
.opt.sel{border-color:var(--accent-mid);background:var(--accent-light);box-shadow:0 0 0 1px var(--accent-mid);}
.opt .radio{width:16px;height:16px;border:2px solid var(--border-strong);border-radius:50%;flex-shrink:0;margin-top:2px;position:relative;transition:all .12s;}
.opt.sel .radio{border-color:var(--accent);}
.opt.sel .radio::after{content:'';position:absolute;inset:3px;border-radius:50%;background:var(--accent);}
.opt .desc{font-size:13px;color:var(--text-secondary);line-height:1.45;}
.opt.sel .desc{color:var(--text-primary);}
/* Thank you */
.thankyou{display:none;max-width:560px;margin:60px auto;padding:0 24px;text-align:center;}
.thankyou.show{display:block;animation:fade .3s ease;}
.ty-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-md);padding:40px 32px;}
.ty-check{width:56px;height:56px;border-radius:50%;background:var(--accent-light);color:var(--accent);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px;}
.ty-card h2{font-size:22px;font-weight:700;margin-bottom:8px;}
.ty-card p{font-size:14px;color:var(--text-secondary);margin-bottom:6px;}
.ty-card a{color:var(--accent);font-weight:600;}
.ty-card .btn{margin-top:22px;}
.actionbar{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);box-shadow:0 -4px 20px rgba(0,0,0,.06);padding:12px 24px;z-index:50;}
.actionbar .inner{max-width:780px;margin:0 auto;width:100%;display:flex;align-items:center;gap:12px;}
.actionbar .status{flex:1;font-size:12.5px;color:var(--text-secondary);}
.actionbar .status.err{color:var(--red);} .actionbar .status.ok{color:var(--accent);}
.btn{font-family:inherit;font-size:13px;font-weight:600;padding:10px 18px;border-radius:var(--radius-sm);cursor:pointer;border:1px solid transparent;transition:all .12s;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-ghost{background:var(--surface);border-color:var(--border-strong);color:var(--text-primary);}
.btn-ghost:not(:disabled):hover{background:var(--surface-alt);}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:not(:disabled):hover{background:var(--accent-mid);}
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:-2px;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:560px){.meta{grid-template-columns:1fr;}}
</style>
</head>
<body>
<header class="hero">
  <div class="hero-badge"><span class="dot"></span> Sarvadhi · Dumbledore</div>
  <h1>SDE-I Assessment Form</h1>
  <p>20 questions across 8 areas · answer each step to continue</p>
</header>

<div class="shell" id="shell">
  <div class="meta">
    <div class="field"><label>Engineer Name *</label><input id="m-engineer" placeholder="e.g. Riya Shah"></div>
    <div class="field"><label>Reviewer *</label>
      <select id="m-reviewer">
        <option value="" selected disabled>Select reviewer</option>
        <option>Paras</option><option>Hemal</option><option>Mayur</option><option>Anish</option>
      </select>
    </div>
  </div>
  <div class="stepper">
    <div class="step-head">
      <div class="step-meta"><span class="count" id="step-count">Step 1 of 8</span><span class="answered" id="step-answered">0 / 0</span></div>
      <h2 id="step-title">—</h2>
      <div class="dots" id="dots"></div>
    </div>
    <div class="step-body" id="step-body"></div>
  </div>
</div>

<div class="thankyou" id="thankyou">
  <div class="ty-card">
    <div class="ty-check">✓</div>
    <h2>Thank you!</h2>
    <p>The assessment has been submitted successfully.</p>
    <p id="ty-link"></p>
    <button class="btn btn-primary" onclick="window.location.reload()">Submit another response</button>
  </div>
</div>

<div class="actionbar" id="actionbar">
  <div class="inner">
    <div class="status" id="status">Step 1 of 8.</div>
    <button class="btn btn-ghost" id="btn-back" style="display:none;">Back</button>
    <button class="btn btn-primary" id="btn-next">Next</button>
    <button class="btn btn-primary" id="btn-submit" style="display:none;" disabled>Submit</button>
  </div>
</div>

<script>
/* ============================================================
   BACKEND: the form posts to the Vercel serverless relay at
   /api/submit (same origin — no CORS, no hardcoded domain).
   ============================================================ */
const WEBHOOK_URL = "/api/submit";

const SECTIONS=[
  {key:"S1",name:"Technical Proficiency",weight:0.25,qs:[
    {id:"Q1",text:"Can this engineer read and explain the code they ship — whether they wrote it or AI generated it?",opts:[
      "Explains any function's logic clearly when asked. Spots errors in AI output before I review it",
      "Reads and traces code independently. Understands data structures, control flow, and patterns",
      "Understands basics — loops, functions, conditionals — needs help on complex logic",
      "Knows syntax but can't explain what a function does without running it first",
      "Cannot read code — copies AI output without knowing what it does"]},
    {id:"Q2",text:"When you assign a task with a written BRD or user story, does this engineer understand what to build without you re-explaining?",opts:[
      "Reads the spec, spots missing edge cases I didn't catch, asks clarifying questions before starting",
      "Understands requirements correctly on first read, validates against acceptance criteria independently",
      "Follows requirements as written, occasionally misses an implied edge case from the spec",
      "Needs me to walk through the requirement verbally — the written spec alone isn't enough",
      "Misinterprets specs regularly — builds the wrong thing, I discover it during review"]},
    {id:"Q3",text:"Does this engineer use AI agents as their primary workflow to write, validate, and deliver code every day?",opts:[
      "Writes clear specs for AI, reviews output critically, delivers production-ready code with minimal manual edits",
      "Uses AI independently for most tasks, validates and refactors output before submitting the PR",
      "Uses AI with occasional guidance on how to prompt or which tool to pick",
      "Needs direction on which AI tool to use, prompts are vague, output requires major rework",
      "Doesn't use AI — writes code manually or uses it only for trivial autocomplete"]}
  ]},
  {key:"S2",name:"Tool & Platform Proficiency",weight:0.15,qs:[
    {id:"Q4",text:"Does this engineer keep tasks, time tracking, and progress updated in the PM tool without you chasing them?",opts:[
      "Task status updated daily, time tracked accurately, progress notes are clear — I never need to ask",
      "Updates 4/5 days, timesheets mostly on time, progress notes present and useful",
      "Updates 3/5 days, timesheets sometimes late, I occasionally check in for status",
      "Updates only when I ask, timesheets frequently missing, I chase for task status weekly",
      "Does not update tasks or log time — I find out what they're doing from other people"]},
    {id:"Q5",text:"Does this engineer use HRMS properly — attendance logged daily, leaves applied in advance, acknowledgments done on time?",opts:[
      "Attendance logged daily without gaps, leaves applied well in advance, all acknowledgments completed on time",
      "HRMS used correctly with rare misses — attendance consistent, leaves applied before taking",
      "Generally compliant, occasionally forgets to log attendance or applies leave after the fact",
      "HRMS compliance needs regular reminders — attendance gaps, leaves applied late",
      "Does not use HRMS — attendance not logged, leaves taken without applying"]},
    {id:"Q6",text:"Does this engineer know how to use agentic engineering platforms — skills, hooks, commands, rules, and plugins — to write efficient code?",opts:[
      "Configures custom skills, hooks, and rules for projects. Discovers useful plugins and the team copies their setup",
      "Uses skills, commands, and rules daily. Tries new plugins and shares what works",
      "Runs standard commands and follows team rules. Doesn't explore beyond what was shown in training",
      "Types basic prompts only. Doesn't use skills, hooks, or rules even when team has documented them",
      "Uses the platform like a search engine. No awareness that skills, commands, or workflows exist"]}
  ]},
  {key:"S3",name:"Delivery Excellence",weight:0.15,qs:[
    {id:"Q7",text:"When this engineer picks up a task, do they understand what to build — or do you find out later they built the wrong thing?",opts:[
      "Reads requirements carefully, asks clarifying questions before starting, delivers exactly what was asked",
      "Understands correctly most of the time, asks when unclear, occasional minor misses",
      "Gets general idea right but misses edge cases — needs one round of correction",
      "Starts coding before understanding, frequently builds the wrong thing — rework common",
      "Does not read or understand requirements — delivers work that doesn't match, repeatedly"]},
    {id:"Q8",text:"Does this engineer finish their committed tasks on time — or do you regularly find incomplete work at the end of the cycle?",opts:[
      "Completes all committed tasks on time, flags risks early, never a surprise at review",
      "Finishes most on time, occasionally one carries over but communicated before deadline",
      "Completes about half on time, some slip without early warning — discover delays at review",
      "Regularly carries over multiple tasks, doesn't flag delays until asked",
      "Almost never finishes committed tasks — you've stopped trusting their estimates"]},
    {id:"Q9",text:"Before this engineer marks a task as done — have they tested it themselves, or does QA find the obvious issues?",opts:[
      "Tests every feature end-to-end including edge cases before marking done. QA rarely finds issues",
      "Tests the happy path and key scenarios consistently. QA finds only edge cases, not obvious bugs",
      "Does basic testing — catches obvious issues but misses edge cases regularly",
      "Tests only when reminded. QA frequently finds issues a quick self-check would have caught",
      "Does not test own work. Marks tasks done without any verification"]}
  ]},
  {key:"S4",name:"Productivity & Time Mgmt",weight:0.15,qs:[
    {id:"Q10",text:"Does this engineer use their working hours effectively — staying productive, planning ahead, and never sitting idle between tasks?",opts:[
      "Always productive — plans next steps while current work runs, reviews PRs in gaps, preps test scenarios. You never see idle time",
      "Finds useful work during gaps without being told. Rarely sits waiting between tasks",
      "Productive when working on a task but goes quiet between them. Doesn't naturally fill gaps",
      "Noticeable idle time during the day. Waits for the next assignment instead of finding useful work",
      "Output doesn't match hours. Long gaps with no progress despite conversations about it"]},
    {id:"Q11",text:"Does this engineer learn new things and bring fresh ideas, tools, or approaches to the team?",opts:[
      "Regularly brings new tools, techniques, or approaches the team hasn't tried. Their learning directly improves how we work",
      "Explores new things independently and shares useful findings with the team",
      "Learns what's needed for current tasks. Open to new approaches when suggested by others",
      "Learns only when instructed. Sticks to what they know. Doesn't explore or suggest anything new",
      "No learning initiative. Uses the same approaches regardless of better options. Resistant to new things"]},
    {id:"Q12",text:"When this engineer estimates a task — how close is the estimate to how long the work actually takes?",opts:[
      "Within \u00b120% consistently. Breaks tasks down before estimating and updates if scope changes",
      "Off by 30-40% sometimes but improving. Gives estimates without being asked",
      "Tasks often take 1.5-2x longer. Gives estimates when asked but doesn't volunteer them",
      "Off by 2-3x regularly. Doesn't think about time before starting",
      "Cannot estimate. Random numbers or \"I don't know.\" You can't plan around their timelines"]}
  ]},
  {key:"S5",name:"Learning & Adaptability",weight:0.15,qs:[
    {id:"Q13",text:"Does this engineer use AI coding tools as their default way of working — or do they still code manually and treat AI as optional?",opts:[
      "AI tools are first instinct for every task. Productivity visibly higher than manual coding would allow",
      "Uses AI daily for most tasks. Occasionally falls back to manual but AI is clearly the default",
      "Uses AI when reminded or for specific tasks. Default habit is still manual coding",
      "Tries AI occasionally but doesn't trust output. Reverts to manual most of the time",
      "Avoids AI tools entirely or uses them so rarely there's no visible impact"]},
    {id:"Q14",text:"When you give this engineer feedback in a review or standup — does it stick, or do you repeat the same thing next month?",opts:[
      "Feedback applied immediately and permanently. Also picks up improvements on their own",
      "Applies consistently. Occasionally needs one reminder on complex changes but pattern improves",
      "Acknowledges and tries but takes multiple reminders before it becomes a habit",
      "Listens but doesn't change. Same points repeated every review cycle",
      "Doesn't absorb feedback. Same mistakes, same gaps, no visible improvement"]}
  ]},
  {key:"S6",name:"Communication & Collaboration",weight:0.05,qs:[
    {id:"Q15",text:"When this engineer gives a status update — do you walk away knowing exactly where things stand?",opts:[
      "Proactively updates, no follow-up needed",
      "Mostly proactive, occasional gaps",
      "Updates when asked, but doesn't maintain communication",
      "Rarely provides useful updates even when asked",
      "No meaningful updates at all"]},
    {id:"Q16",text:"When you send this engineer an email, message, or announcement — do they read it and respond?",opts:[
      "Reads and responds within hours. Acknowledges announcements. Acts on items without reminders",
      "Responds same day. Acknowledges announcements. Occasionally misses low-priority messages",
      "Responds eventually but late. Reads announcements but doesn't acknowledge. Misses action items",
      "Frequently doesn't respond unless pinged again. Action items need separate assignment",
      "Does not read or respond. You've learned to tell them directly"]}
  ]},
  {key:"S7",name:"Ownership & Integrity",weight:0.05,qs:[
    {id:"Q17",text:"When you assign this engineer a task — do they own the outcome, or do you drive it to completion?",opts:[
      "You assign and forget. They clarify upfront, flag risks early, deliver complete. If blocked, you hear within an hour with a solution",
      "Handles most tasks start to finish. Occasionally needs a nudge but doesn't leave things half-done",
      "Does the work but you check in periodically. Without asking, tasks might sit at 80% for days",
      "Tasks stall when you stop watching. Waits for direction instead of pushing through obstacles",
      "Assigning them means you'll finish half yourself. Work routinely incomplete or dropped"]},
    {id:"Q18",text:"When this engineer is behind or made a mistake — do they tell you straight, or do you find out later?",opts:[
      "Proactively admits mistakes and delays. Takes responsibility without blaming others",
      "Tells me when asked honestly. Doesn't volunteer every time but never hides",
      "Admits when confronted but doesn't volunteer. Sometimes says \"almost done\" when not started",
      "Downplays problems. I find out from code, client, or teammate — not from them",
      "Actively hides mistakes. What they say and what's happening are consistently different"]}
  ]},
  {key:"S8",name:"Professional Discipline",weight:0.05,qs:[
    {id:"Q19",text:"Does this engineer follow defined SOPs, checklists, and conventions without reminders?",opts:[
      "Follows every SOP and convention by default. Flags when a process is outdated or could be improved",
      "Follows processes consistently with minimal supervision. Rare deviations that self-correct",
      "Follows SOPs with reasonable effort but needs periodic reminders on specific steps",
      "Follows processes only when instructed. Frequently skips steps under deadline pressure",
      "Does not follow SOPs despite repeated guidance. Creates inconsistency that affects the team"]},
    {id:"Q20",text:"How consistently does this engineer demonstrate respectful and professional conduct in meetings and team interactions?",opts:[
      "Makes meetings better by being there. Listens, responds thoughtfully, juniors feel comfortable around them",
      "Professional in almost every interaction. Bad moments are rare and self-corrected",
      "Generally fine but you've noticed phone-checking or occasionally cutting someone off",
      "You've talked to them about conduct at least once — dismissive, argumentative, or disengaged",
      "Recurring issue. Teammates have complained. Feedback given multiple times, no change"]}
  ]}
];

const QMETA={}; SECTIONS.forEach(s=>s.qs.forEach(q=>QMETA[q.id]={section:s.name,text:q.text,opts:q.opts}));
const answers={}; const rendered={}; let step=0;
function shuffle(a){const r=a.slice();for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}

const body=document.getElementById('step-body');
SECTIONS.forEach((s,si)=>{
  const p=document.createElement('div');p.className='panel'+(si===0?' active':'');p.id='panel-'+si;
  s.qs.forEach(q=>{
    const shuf=shuffle(q.opts.map((d,i)=>({score:5-i,desc:d})));rendered[q.id]=shuf;
    const qd=document.createElement('div');qd.className='q';
    let html=`<div class="q-head"><span class="q-num">${q.id}</span><span class="q-text">"${q.text}"</span></div>`;
    shuf.forEach((o,idx)=>{html+=`<div class="opt" data-q="${q.id}" data-idx="${idx}"><span class="radio"></span><span class="desc">${o.desc}</span></div>`;});
    qd.innerHTML=html;p.appendChild(qd);
  });
  body.appendChild(p);
});
const dots=document.getElementById('dots');
SECTIONS.forEach((s,si)=>{const d=document.createElement('div');d.className='dot-step';d.id='dot-'+si;dots.appendChild(d);});

body.addEventListener('click',e=>{
  const opt=e.target.closest('.opt');if(!opt)return;
  answers[opt.dataset.q]=rendered[opt.dataset.q][+opt.dataset.idx].score;
  opt.parentElement.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel'));
  opt.classList.add('sel');render();
});
document.getElementById('m-engineer').addEventListener('input',render);
document.getElementById('m-reviewer').addEventListener('change',render);

function secCount(s){let n=0;s.qs.forEach(q=>{if(answers[q.id])n++;});return n;}
function totalAnswered(){return Object.keys(answers).length;}
function secComplete(si){const s=SECTIONS[si];return secCount(s)===s.qs.length;}

function render(){
  const s=SECTIONS[step];
  document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('active',i===step));
  document.getElementById('step-count').textContent=`Step ${step+1} of ${SECTIONS.length}`;
  document.getElementById('step-title').textContent=s.name;
  document.getElementById('step-answered').textContent=`${secCount(s)} / ${s.qs.length}`;
  SECTIONS.forEach((_,i)=>{document.getElementById('dot-'+i).className='dot-step'+(i===step?' cur':(secComplete(i)?' done':''));});
  const isLast=step===SECTIONS.length-1;
  document.getElementById('btn-back').style.display=step>0?'inline-block':'none';
  document.getElementById('btn-next').style.display=isLast?'none':'inline-block';
  const submit=document.getElementById('btn-submit');
  submit.style.display=isLast?'inline-block':'none';
  document.getElementById('btn-next').disabled=!secComplete(step);
  const engineer=document.getElementById('m-engineer').value.trim();
  const reviewer=document.getElementById('m-reviewer').value;
  const allDone=totalAnswered()===20&&engineer&&reviewer;
  submit.disabled=!allDone;
  const st=document.getElementById('status');st.className='status';
  if(isLast){
    if(allDone)st.textContent='All 20 answered. Ready to submit.';
    else if(totalAnswered()<20)st.textContent=`Answered ${totalAnswered()}/20 — complete every step.`;
    else if(!engineer)st.textContent='Enter Engineer Name to submit.';
    else st.textContent='Select a Reviewer to submit.';
  } else st.textContent=secComplete(step)?`Step ${step+1} complete — continue.`:`Answer all ${s.qs.length} questions to continue.`;
}
document.getElementById('btn-next').addEventListener('click',()=>{if(step<SECTIONS.length-1&&secComplete(step)){step++;render();window.scrollTo({top:0,behavior:'smooth'});}});
document.getElementById('btn-back').addEventListener('click',()=>{if(step>0){step--;render();window.scrollTo({top:0,behavior:'smooth'});}});

function selectedText(qid,score){return QMETA[qid].opts[5-score];}
function collect(){
  let out=[];SECTIONS.forEach(s=>{out.push('【'+s.name+'】');s.qs.forEach(q=>out.push(q.id+' — '+selectedText(q.id,answers[q.id])));});
  let answersText=out.join('\n');if(answersText.length>1990)answersText=answersText.slice(0,1987)+'…';
  return {engineer:document.getElementById('m-engineer').value.trim(),reviewer:document.getElementById('m-reviewer').value,
    submittedAt:new Date().toISOString(),answers:{...answers},answersText};
}

document.getElementById('btn-submit').addEventListener('click',async()=>{
  if(!WEBHOOK_URL||WEBHOOK_URL.indexOf('PASTE_')===0){
    const st=document.getElementById('status');st.className='status err';
    st.textContent='Backend not configured: set WEBHOOK_URL to your relay URL (see setup notes).';return;
  }
  const d=collect();
  const btn=document.getElementById('btn-submit'),st=document.getElementById('status');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>Submitting…';st.className='status';st.textContent='Submitting…';
  try{
    const res=await fetch(WEBHOOK_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});
    let body={};try{body=await res.json();}catch(_){}
    if(res.ok&&(body.ok!==false)){
      document.getElementById('shell').style.display='none';
      document.getElementById('actionbar').style.display='none';
      if(body.url)document.getElementById('ty-link').innerHTML=`<a href="${body.url}" target="_blank" rel="noopener">View in Notion</a>`;
      document.getElementById('thankyou').classList.add('show');
      window.scrollTo({top:0,behavior:'smooth'});
    } else {
      st.className='status err';st.textContent='Submit failed'+(body.error?': '+JSON.stringify(body.error).slice(0,160):' ('+res.status+').');
      btn.disabled=false;btn.innerHTML='Submit';
    }
  }catch(err){
    st.className='status err';st.textContent='Submit failed: '+err.message+' (check the relay URL / CORS).';
    btn.disabled=false;btn.innerHTML='Submit';
  }
});
render();
</script>
</body>
</html>
